    margin:0;

  .neon-yellow{ box-shadow: 0 0 0 1px rgba(251,191,36,0.35), 0 0 24px rgba(251,191,36,0.25); }

    100%{transform:scale(1);opacity:0}
  }
  .heartbeat{ animation:hb 1.1s ease-in-out infinite; transform-origin:center; }
  @keyframes hb{
    0%,100%{transform:scale(1)}
    20%{transform:scale(1.15)}
    40%{transform:scale(0.95)}
    60%{transform:scale(1.08)}
  }
  .fade-in{ animation:fade .4s ease both; }
  @keyframes fade{ from{opacity:0; transform: translateY(6px)} to{opacity:1; transform:none} }

  .chip.warn{ color:#fde68a; border-color:rgba(251,191,36,0.3); background:rgba(251,191,36,0.08); }
  .chip.crit{ color:#fecdd3; border-color:rgba(255,77,109,0.35); background:rgba(255,77,109,0.08); }

/* ---------- ThingSpeak API Integration ---------- */
function useSensorStream(){
  const [series, setSeries] = useState([]);
  const [latest, setLatest] = useState({ hr: 76, light: 420, signal: 92, battery: 84, deviceId: "MY-ESP32" });

  // === THINGSPEAK CONFIGURATION ===
  // 1. Enter your ThingSpeak Channel ID here (e.g. "1234567")
  const CHANNEL_ID = "YOUR_CHANNEL_ID"; // TODO: replace with your actual ThingSpeak Channel ID
  
  // 2. Enter your ThingSpeak Read API Key here (e.g. "ABCDEF123456")
  const READ_API_KEY = "OMSG4XBQ1WY507SE"; // Provided Read API Key
  // ================================

  useEffect(() => {
    let isMounted = true;
    
    const fetchData = async () => {
      // Fallback Simulator if ThingSpeak is not configured yet
      if (CHANNEL_ID === "YOUR_CHANNEL_ID") {
         setSeries(prev => {
            const now = Date.now();
            const lastHr = prev.length ? prev[prev.length-1].hr : 75;
            const lastLight = prev.length ? prev[prev.length-1].light : 400;
            const newPt = {
               time: new Date(now).toLocaleTimeString([], {hour12:false}),
               hr: Math.max(50, Math.min(140, lastHr + (Math.random()-0.5)*4)),
               light: Math.max(0, Math.min(4095, lastLight + (Math.random()-0.5)*150))
            };
            const next = [...prev.slice(-59), newPt];
            setLatest(l => ({ ...l, hr: Math.round(newPt.hr), light: Math.round(newPt.light), signal: Math.max(60, Math.min(100, l.signal + (Math.random()-0.5)*4)) }));
            return next;
         });
         return;
      }
      
      try {
        // Fetch last 60 records from ThingSpeak
        const res = await fetch(`https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?api_key=${READ_API_KEY}&results=60`);
        const data = await res.json();
        
        if (data.feeds && data.feeds.length > 0 && isMounted) {
          const newSeries = data.feeds.map(f => ({
            time: new Date(f.created_at).toLocaleTimeString([], {hour12:false}),
            hr: parseInt(f.field1) || 0,
            light: parseInt(f.field2) || 0
          }));
          
          setSeries(newSeries);
          const last = newSeries[newSeries.length - 1];
          setLatest(prev => ({ ...prev, hr: last.hr, light: last.light }));
        }
      } catch (err) {
        console.error("ThingSpeak fetch failed", err);
      }
    };
    
    // Initial fetch
    fetchData();
    
    // ThingSpeak rate limit is 15 seconds. If simulating, do 1.5s for smooth UI, else 15s.
    const intervalTime = CHANNEL_ID === "YOUR_CHANNEL_ID" ? 1500 : 15000;
    const interval = setInterval(fetchData, intervalTime); 
    
    return () => { isMounted = false; clearInterval(interval); };
  }, []);

  return { series, latest };
}

/* ---------- Weather API Hook ---------- */
function useWeather(location) {
  const [weather, setWeather] = useState({ temp: "--", hum: "--" });
  
  useEffect(() => {
    if(!location) return;
    let isMounted = true;
    
    const fetchWeather = async () => {
      try {
        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${location}&count=1&format=json`);
        const geoData = await geoRes.json();
        
        if (geoData.results && geoData.results.length > 0) {
          const { latitude, longitude } = geoData.results[0];
          const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m`);
          const wData = await wRes.json();
          
          if (wData.current && isMounted) {
            setWeather({
              temp: wData.current.temperature_2m,
              hum: wData.current.relative_humidity_2m
            });
          }
        }
      } catch (err) {
        console.error("Weather fetch failed", err);
      }
    };
    
    fetchWeather();
    const interval = setInterval(fetchWeather, 600000); // 10 mins
    return () => { isMounted = false; clearInterval(interval); };
  }, [location]);
  
  return weather;
}

/* ---------- Helpers ---------- */
function classify(metric, v){
  if (v === "--") return "ok";
  if (metric==="hr"){
    if (v<55 || v>115) return "crit";
    if (v>100 && v<=115) return "warn";
    if (v>=90 && v<=100) return "warn";
    return "ok";
  }
  if (metric==="light"){
    if (v<100) return "warn";
    if (v>3500) return "warn";
    return "ok";
  }
  if (metric==="temp"){
    if (v>=38 || v<5) return "crit";
    if (v>=35 || v<10) return "warn";
    return "ok";
  }
  if (metric==="hum"){
    if (v<20 || v>80) return "warn";
    return "ok";
  }
  return "ok";
}

const KPI = ({ title, value, unit, color, status, sparkline, icon }) => {
  const statusClass = status ? `chip ${status}` : "chip ok";

  let colorVar = color==="red" ? "var(--red)" : color==="yellow" ? "var(--yellow)" : "var(--cyan)";
  let neonClass = status==="crit" ? "neon-red" : status==="warn" && color==="yellow" ? "neon-yellow" : "";

  return (
    <div className={`glass p-4 fade-in relative overflow-hidden ${neonClass}`}>
      <div className="flex items-start justify-between">
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center"
               style={{background: bgSoft, color: colorVar}}>
            <Icon d={icon}/>
          </div>
          <div className="stat-label">{title}</div>
        </div>
        <span className={statusClass}>{statusText}</span>
      </div>

      <div className="mt-3 flex items-baseline gap-2">
        <span className="stat-value text-[34px] leading-none"
              style={{color: status==="crit"?"var(--red)": color==="red"?"var(--red)":"#e7eef5"}}>{value}</span>
        <span className="text-[12px]" style={{color:"var(--muted)"}}>{unit}</span>
      </div>

      <div style={{height:46}} className="mt-2 -mx-1">
        {sparkline && (
          <ResponsiveContainer width="100%" height="100%">
            <AreaChart data={sparkline}>
              <defs>
                <linearGradient id={"sg-"+title} x1="0" y1="0" x2="0" y2="1">

      <AreaChart data={data} margin={{top:5,right:10,left:-10,bottom:0}}>
        <defs>
          <linearGradient id="hrGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#22d3ee" stopOpacity={0.4}/>
            <stop offset="100%" stopColor="#22d3ee" stopOpacity={0}/>
          </linearGradient>
        </defs>
        <CartesianGrid stroke="#1a1f29" vertical={false}/>
        <XAxis dataKey="time" tick={{fill:"#6b7689", fontSize:10}} interval={Math.floor(data.length/6)} stroke="#1f2530"/>
        <YAxis domain={[40,140]} tick={{fill:"#6b7689", fontSize:10}} stroke="#1f2530" width={36}/>
        <Tooltip content={<CustomTooltip units={{hr:" bpm"}}/>} />
        <ReferenceLine y={60} stroke="#475569" strokeDasharray="3 3" />
        <ReferenceLine y={100} stroke="#475569" strokeDasharray="3 3" />
        <Area type="monotone" name="Heart Rate" dataKey="hr" stroke="#22d3ee" strokeWidth={2.2} fill="url(#hrGrad)" isAnimationActive={false} dot={false}/>
      </AreaChart>
    </ResponsiveContainer>
  </div>
);

const LightLevelChart = ({ data }) => (
  <div className="glass p-5 fade-in flex-1">
    <div className="flex items-center justify-between mb-3">
      <div>
        <div className="flex items-center gap-2">
          <Icon d={icons.sun} />
          <h3 className="font-semibold text-[15px]">Ambient Light (LDR)</h3>
          <span className="chip" style={{color:"#fbbf24", borderColor:"rgba(251,191,36,0.3)"}}>ADC Value</span>
        </div>
        <div className="text-[11px] mt-1" style={{color:"var(--muted)"}}>Environment illumination feed</div>
      </div>
    </div>
    <ResponsiveContainer width="100%" height={250}>
      <AreaChart data={data} margin={{top:5,right:10,left:-10,bottom:0}}>
        <defs>
          <linearGradient id="lightGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#fbbf24" stopOpacity={0.4}/>
            <stop offset="100%" stopColor="#fbbf24" stopOpacity={0}/>
          </linearGradient>
        </defs>
        <CartesianGrid stroke="#1a1f29" vertical={false}/>
        <XAxis dataKey="time" tick={{fill:"#6b7689", fontSize:10}} interval={Math.floor(data.length/6)} stroke="#1f2530"/>
        <YAxis domain={[0, 4095]} tick={{fill:"#6b7689", fontSize:10}} stroke="#1f2530" width={40}/>
        <Tooltip content={<CustomTooltip units={{light:""}}/>} />
        <Area type="monotone" name="Light" dataKey="light" stroke="#fbbf24" strokeWidth={2.2} fill="url(#lightGrad)" dot={false} isAnimationActive={false}/>
      </AreaChart>
    </ResponsiveContainer>
  </div>
);

const SignalGauge = ({ latest }) => {
  const data = [{name:"Signal", value: Math.round(latest.signal), fill:"#22d3ee"}];
  return (
    <div className="glass p-5 fade-in flex-1 h-full">
      <div className="flex items-center justify-between">
        <h3 className="font-semibold text-[15px]">ESP32 Health</h3>
        <span className="chip cyan">{latest.deviceId}</span>
      </div>
      <div className="flex items-center gap-2 mt-4">
        <div style={{width:140, height:140}}>
          <ResponsiveContainer>
            <RadialBarChart innerRadius="70%" outerRadius="100%" data={data} startAngle={220} endAngle={-40}>
              <PolarAngleAxis type="number" domain={[0,100]} tick={false}/>
              <RadialBar dataKey="value" cornerRadius={10} background={{fill:"#1a1f29"}} isAnimationActive={false}/>
            </RadialBarChart>
          </ResponsiveContainer>
        </div>
        <div className="-ml-28 text-center pointer-events-none" style={{width:140}}>
          <div className="stat-value text-[26px]" style={{color:"var(--cyan)"}}>{Math.round(latest.signal)}%</div>
          <div className="text-[10px]" style={{color:"var(--muted)"}}>WIFI SIG</div>
        </div>
        <div className="flex-1 ml-4 space-y-3">
          <Bar2 label="Battery" value={latest.battery} color="#34d399"/>
          <Bar2 label="LDR Sensor" value={98} color="#fbbf24"/>
          <Bar2 label="Pulse Sensor" value={95} color="#ff4d6d"/>
          <Bar2 label="Latency" value={80} color="#a78bfa" suffix={"ms"} raw={"24"}/>
        </div>
      </div>
    </div>
  );
};

const Bar2 = ({label, value, color, suffix="%", raw}) => (
  <div>
    <div className="flex justify-between text-[11px] mb-1" style={{color:"var(--muted)"}}>
      <span>{label}</span><span style={{color:"#cbd5e1"}}>{raw ?? Math.round(value)}{suffix}</span>
    </div>
    <div className="h-1.5 rounded-full" style={{background:"#11151c"}}>
      <div className="h-full rounded-full" style={{width: `${Math.min(100, value)}%`, background: color, boxShadow:`0 0 8px ${color}`}}></div>
    </div>
  </div>
);

const RecommendationEngine = ({ latest }) => {
  const hr = latest.hr;
  const ldr = latest.light;
  let msg = "";
  let title = "";
  let lvl = "";
  let glow = "";
  
  if (hr > 115 || hr < 55) {
    title = "High Stress Alert";
    lvl = "crit";
    glow = "neon-red";
    msg = "Your current readings suggest a significantly elevated heart rate. If you are not engaged in physical activity, consider taking immediate time to relax and reduce mental strain. Find a comfortable environment, focus on slow breathing, and allow your body to recover. Persistent elevations should not be ignored.";
  } else if (hr > 100 && hr <= 115) {
    title = "Elevated Stress Level";
    lvl = "warn";
    glow = "neon-yellow";
    msg = "Your heart rate is currently higher than your normal resting range. This may indicate increased stress, anxiety, fatigue, or overexertion. Try slowing down for a moment, take several deep breaths, and allow yourself time to recover. Prioritizing mental calmness can improve both performance and overall well-being.";
  } else if (hr >= 90 && hr <= 100) {
    title = "Mild Stress Detected";
    lvl = "warn";
    glow = "neon-yellow";
    msg = "A slight increase in heart rate has been observed. This may be associated with physical activity, mental workload, or temporary stress. Consider taking a short break, stretching, or practicing deep breathing exercises. Even a few minutes of relaxation can help restore focus and mental clarity.";
  } else if (hr >= 60 && hr < 75 && ldr > 200 && ldr < 3000) {
    title = "Relaxed State";
    lvl = "ok";
    glow = "neon-cyan";
    msg = "You appear to be in a calm and relaxed state. This is an excellent time for focused work, meditation, reading, or creative activities. Maintaining moments of calm throughout the day contributes positively to both mental and physical wellness.";
  } else if (ldr < 100) {
    title = "Low Light Environment";
    lvl = "warn";
    msg = "The surrounding environment appears dimly lit. Extended periods in poor lighting may contribute to eye strain, reduced alertness, and fatigue. Consider moving to a brighter environment or increasing ambient lighting to maintain comfort and productivity.";
  } else if (ldr > 3800) {
    title = "Excessive Brightness";
    lvl = "warn";
    msg = "High light intensity has been detected. Excessive brightness can contribute to visual discomfort and fatigue over time. If possible, reduce glare or adjust your surroundings to create a more comfortable environment.";
  } else {
    title = "Normal Wellness State";
    lvl = "ok";
    msg = "Your wellness indicators appear stable and balanced. Your heart rate is within a healthy range, suggesting a calm and relaxed state. Continue maintaining your current routine and stay hydrated throughout the day. Small healthy habits practiced consistently lead to long-term well-being.";
  }

  const quotes = [
    "Every small step toward wellness creates lasting positive change.",
    "A calm mind and a healthy body are built through consistent daily habits.",
    "Pause, breathe, and reset. Your well-being deserves attention.",
    "Progress is not measured by perfection but by consistency.",
    "Take a moment to care for yourself today; your future self will thank you.",
    "Balance is the foundation of sustainable productivity and happiness.",
    "Wellness is a journey of awareness, not a destination.",
    "Your health is your greatest asset—invest in it every day.",
    "Even a brief moment of mindfulness can transform your entire day.",
    "Listening to your body is the first step toward living healthier and happier."
  ];
  const qIdx = (new Date().getDay() + Math.floor(hr/10)) % quotes.length;
  
  return (
    <div className={`glass p-5 fade-in flex-1 flex flex-col justify-between ${glow}`}>
      <div>
        <div className="flex items-center gap-2 mb-4">
          <Icon d={icons.shield}/>
          <h3 className="font-semibold text-[15px]">Wellness Engine (AI)</h3>
          <span className={`chip ml-auto ${lvl}`}>{title}</span>
        </div>
        <p className="text-[13px] leading-relaxed" style={{color:"var(--text)"}}>
          {msg}
        </p>
      </div>
      <div className="mt-4 pt-4 border-t border-[rgba(255,255,255,0.05)]">
        <p className="text-[12px] italic text-center font-medium" style={{color:"var(--cyan)"}}>"{quotes[qIdx]}"</p>
      </div>
    </div>
  );
};

const HistoryView = ({ series }) => {
  return (
    <div className="p-5 grid-bg fade-in">
      <h2 className="text-[22px] font-bold tracking-tight mb-5">Historical Data & Stats</h2>
      <div className="glass p-5 mb-5">
        <h3 className="font-semibold mb-3">Previous 24h Trends (Simulated)</h3>
        <ResponsiveContainer width="100%" height={300}>
          <LineChart data={series.slice(-40)}>
            <CartesianGrid stroke="#1a1f29" vertical={false}/>
            <XAxis dataKey="time" stroke="#1f2530" tick={{fill:"#6b7689", fontSize:10}}/>
            <YAxis yAxisId="left" domain={[40, 140]} stroke="#1f2530" tick={{fill:"#6b7689", fontSize:10}}/>
            <YAxis yAxisId="right" orientation="right" domain={[0, 4095]} stroke="#1f2530" tick={{fill:"#6b7689", fontSize:10}}/>
            <Tooltip content={<CustomTooltip units={{hr:" bpm", light:""}}/>}/>
            <Line yAxisId="left" type="monotone" name="Heart Rate" dataKey="hr" stroke="#22d3ee" strokeWidth={2} dot={false}/>
            <Line yAxisId="right" type="monotone" name="Light" dataKey="light" stroke="#fbbf24" strokeWidth={2} dot={false}/>
          </LineChart>
        </ResponsiveContainer>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div className="glass p-5 flex flex-col items-center justify-center">
          <h4 className="text-[14px] font-semibold mb-2" style={{color:"var(--muted)"}}>Avg Heart Rate</h4>
          <div className="text-[32px] font-bold text-[#22d3ee]">76 <span className="text-[16px] text-gray-500 font-normal">bpm</span></div>
        </div>
        <div className="glass p-5 flex flex-col items-center justify-center">
          <h4 className="text-[14px] font-semibold mb-2" style={{color:"var(--muted)"}}>Avg Ambient Light</h4>
          <div className="text-[32px] font-bold text-[#fbbf24]">1250 <span className="text-[16px] text-gray-500 font-normal">ADC</span></div>
        </div>
        <div className="glass p-5 flex flex-col items-center justify-center">
          <h4 className="text-[14px] font-semibold mb-2" style={{color:"var(--muted)"}}>Overall Stress Score</h4>
          <div className="text-[32px] font-bold text-[#34d399]">Relaxed</div>
        </div>
      </div>
    </div>
  )
};

const App = () => {
  const [active, setActive] = useState("dashboard");
  const [location, setLocation] = useState("London");
  
  const { series, latest } = useSensorStream();
  const weather = useWeather(location);

  const hrSpark = useMemo(()=>series.slice(-20).map(p=>({v:p.hr})), [series]);
  const lightSpark = useMemo(()=>series.slice(-20).map(p=>({v:p.light})), [series]);

  return (
    <div className="min-h-screen lg:h-screen flex">
      <Sidebar active={active} setActive={setActive}/>
      <main className="flex-1 lg:ml-64 h-screen overflow-y-auto scroll-area">
        <TopBar latest={latest} online={true} location={location} setLocation={setLocation}/>
        
        {active === "history" ? (
          <HistoryView series={series} />
        ) : (
          <div className="p-5 grid-bg">
            <div className="flex items-end justify-between mb-5 flex-wrap gap-3">
              <div>
                <h1 className="text-[22px] font-bold tracking-tight">My Personal Dashboard</h1>
                <div className="text-[12px]" style={{color:"var(--muted)"}}>
                  Sensors: <span style={{color:"var(--cyan)"}}>ESP32 (HR + LDR)</span> • Weather: <span style={{color:"#fbbf24"}}>{location}</span>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 mb-5">
              <KPI title="Heart Rate" value={latest.hr} unit="bpm"
                   color={classify("hr", latest.hr)==="crit"?"red":"cyan"}
                   status={classify("hr", latest.hr)}
                   sparkline={hrSpark} icon={icons.heart}/>
                   
              <KPI title="Ambient Light" value={latest.light} unit="ADC"
                   color="yellow"
                   status={classify("light", latest.light)}
                   sparkline={lightSpark} icon={icons.sun}/>
                   
              <KPI title="Temperature" value={weather.temp} unit="°C"
                   color={classify("temp", weather.temp)==="crit"?"red":"cyan"}
                   status={classify("temp", weather.temp)}
                   icon={icons.temp}/>
                   
              <KPI title="Humidity" value={weather.hum} unit="%"
                   color="cyan"
                   status={classify("hum", weather.hum)}
                   icon={icons.droplet}/>
            </div>

            <div className="grid grid-cols-1 xl:grid-cols-2 gap-4 mb-5">
              <HeartRateChart data={series}/>
              <LightLevelChart data={series}/>
            </div>

            <div className="grid grid-cols-1 xl:grid-cols-2 gap-4 mb-5">
              <RecommendationEngine latest={latest} />
              <SignalGauge latest={latest}/>
            </div>

            <div className="text-center text-[11px] py-3" style={{color:"var(--muted)"}}>
              My PulseIQ © {new Date().getFullYear()} • ESP32 + React • Built for Personal Wellness
            </div>
          </div>
        )}      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
